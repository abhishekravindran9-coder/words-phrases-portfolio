# =============================================
# PROD profile — Neon PostgreSQL
# All secrets are injected as environment variables on Render.
# Never commit real credentials here.
# =============================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Neon pooler (PgBouncer) compatibility — disable server-side prepared statements
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0

# Connection pool tuning for Render free tier (512 MB RAM)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# Disable H2 console in prod
spring.h2.console.enabled=false

# Logging — confirm DB connection and table creation
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
logging.level.com.zaxxer.hikari=INFO
logging.level.com.wordphrases=DEBUG
