# =============================================
# PROD profile — Neon PostgreSQL
# All secrets are injected as environment variables on Render.
# Never commit real credentials here.
# =============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Connection pool tuning for Render free tier (512 MB RAM)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# Disable H2 console in prod
spring.h2.console.enabled=false

# Logging — confirm DB connection and table creation
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
logging.level.com.zaxxer.hikari=INFO
logging.level.com.wordphrases=DEBUG
