# =============================================
# DEV profile — H2 in-memory (local only)
# =============================================
spring.datasource.url=jdbc:h2:mem:wordphrases;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Set GEMINI_API_KEY env var locally, or override here (do NOT commit real keys)
# app.gemini.api-key=YOUR_KEY_HERE
