# =============================================
# Words & Phrases Portfolio - Base Config
# Profile-specific overrides in:
#   application-dev.properties  (local H2)
#   application-prod.properties (Neon PostgreSQL)
# =============================================

# Active profile — override with SPRING_PROFILES_ACTIVE env var on Render
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=${PORT:8080}
server.error.include-message=always

# ---- JWT ----
app.jwt.secret=${JWT_SECRET:YourSuperSecretJwtKeyThatIsAtLeast256BitsLong_ChangeInProduction}
app.jwt.expiration-ms=86400000

# ---- Mail (disabled – configure SMTP to enable) ----
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
app.mail.from=noreply@wordsphrases.com

# ---- Gemini AI ----
app.gemini.api-key=${GEMINI_API_KEY:AIzaSyC3dyVJpwQW1LCejXfBZiEFIJosXmInWSU}
app.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# ---- CORS ----
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ---- Logging ----
logging.level.com.wordphrases=INFO
logging.level.org.springframework.security=WARN
